name: Syndicate MDX articles → WordPress.com + Blogger + Tumblr

on:
  push:
    branches: [main]
    paths: ['src/content/articles/**/*.mdx']
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: "changed" (default) or "all"'
        required: false
        default: 'changed'

jobs:
  syndicate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install gray-matter
        run: npm install gray-matter

      - name: Find changed MDX files
        if: github.event.inputs.mode != 'all'
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'src/content/articles/**/*.mdx' || echo "")
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Found changed: $FILES"

      - name: Syndicate changed articles
        if: github.event.inputs.mode != 'all' && steps.changed.outputs.files != ''
        env:
          WORDPRESS_SITE_ID: ${{ secrets.WORDPRESS_SITE_ID }}
          WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGGER_ACCESS_TOKEN: ${{ secrets.BLOGGER_ACCESS_TOKEN }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
          TUMBLR_ACCESS_TOKEN: ${{ secrets.TUMBLR_ACCESS_TOKEN }}
        run: node scripts/syndicate-articles.js ${{ steps.changed.outputs.files }}

      - name: Syndicate ALL articles
        if: github.event.inputs.mode == 'all'
        env:
          WORDPRESS_SITE_ID: ${{ secrets.WORDPRESS_SITE_ID }}
          WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGGER_ACCESS_TOKEN: ${{ secrets.BLOGGER_ACCESS_TOKEN }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
          TUMBLR_ACCESS_TOKEN: ${{ secrets.TUMBLR_ACCESS_TOKEN }}
        run: node scripts/syndicate-articles.js --all
