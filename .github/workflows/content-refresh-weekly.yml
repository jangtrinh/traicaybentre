name: Weekly content refresh + FAQ expansion

on:
  schedule:
    - cron: '0 3 * * 1' # Every Monday 3:00 UTC (10:00 Vietnam)
  workflow_dispatch: # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install gray-matter

      - name: Expand FAQ (articles with < 3 FAQ)
        run: node scripts/expand-faq.js

      - name: Refresh stale content
        run: node scripts/refresh-content.js

      - name: Commit + push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(content): weekly refresh — FAQ expansion + freshness signal [bot]"
            git push
          fi
